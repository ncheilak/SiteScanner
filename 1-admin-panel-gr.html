<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteLog — Διαχείριση Εργαζομένων (Supabase)</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --black: #0d0d0d; --yellow: #f5c800; --yellow-dk: #c9a200; --orange: #e8600a;
    --white: #f4efe6; --gray: #1e1e1e; --gray2: #2a2a2a; --gray3: #3d3d3d;
    --gray4: #5a5a5a; --green: #2ea84f; --red: #d93b3b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }

  header {
    background: var(--yellow); color: var(--black); padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 4px solid var(--orange); position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; letter-spacing: 3px; }
  .logo em { color: var(--orange); font-style: normal; }
  .nav-tabs { display: flex; gap: 4px; }
  .tab-btn {
    background: rgba(0,0,0,0.12); border: none; padding: 7px 18px;
    font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 1.5px;
    color: var(--black); cursor: pointer; border-radius: 2px; transition: background 0.15s;
  }
  .tab-btn.active, .tab-btn:hover { background: var(--black); color: var(--yellow); }

  .page { display: none; max-width: 1120px; margin: 0 auto; padding: 28px 16px; }
  .page.active { display: block; }

  .card { background: var(--gray); border: 1px solid var(--gray3); border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
  .card-header {
    background: var(--gray2); padding: 10px 18px; font-family: 'Bebas Neue', sans-serif;
    font-size: 1.05rem; letter-spacing: 2px; color: var(--yellow);
    border-bottom: 2px solid var(--orange); display: flex; align-items: center; justify-content: space-between;
  }
  .card-body { padding: 18px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; font-weight: 600; color: var(--yellow); text-transform: uppercase; letter-spacing: 1px; }
  input, select, textarea {
    background: var(--black); border: 1px solid var(--gray3); border-radius: 2px;
    color: var(--white); font-family: 'IBM Plex Sans', sans-serif; font-size: 0.88rem;
    padding: 8px 10px; outline: none; transition: border-color 0.15s; width: 100%;
  }
  input:focus, select:focus { border-color: var(--yellow); }
  select option { background: var(--black); }

  .btn { border: none; border-radius: 2px; cursor: pointer; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; transition: opacity 0.15s, transform 0.1s; padding: 10px 20px; font-size: 1rem; }
  .btn:active { transform: scale(0.97); }
  .btn-yellow { background: var(--yellow); color: var(--black); }
  .btn-yellow:hover { background: var(--yellow-dk); }
  .btn-orange { background: var(--orange); color: #fff; }
  .btn-outline { background: transparent; border: 1px solid var(--gray3); color: var(--white); font-size: 0.85rem; }
  .btn-outline:hover { border-color: var(--yellow); color: var(--yellow); }
  .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
  .btn-red { background: var(--red); color: #fff; }

  .worker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .worker-card { background: var(--gray2); border: 1px solid var(--gray3); border-radius: 3px; padding: 14px; display: flex; flex-direction: column; gap: 10px; position: relative; }
  .worker-card:hover { border-color: var(--yellow); }
  .worker-name { font-weight: 600; font-size: 1rem; }
  .worker-meta { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--gray4); line-height: 1.6; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 2px; font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-yellow { background: rgba(245,200,0,.12); color: var(--yellow); border: 1px solid rgba(245,200,0,.25); }
  .badge-gray   { background: rgba(90,90,90,.2); color: #aaa; border: 1px solid rgba(90,90,90,.3); }
  .qr-thumb { display: flex; justify-content: center; }
  .qr-thumb canvas, .qr-thumb img { border-radius: 3px; }
  .worker-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--gray3); border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
  .stat-box { background: var(--gray2); padding: 14px; text-align: center; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--yellow); line-height: 1; }
  .stat-lbl { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: var(--gray4); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar input { flex: 1; min-width: 160px; }

  @media print { body * { visibility: hidden; } #printArea, #printArea * { visibility: visible; } #printArea { position: fixed; top: 0; left: 0; width: 100%; } }
  #printArea { display: none; }
  .print-badge { width: 85mm; padding: 8mm; border: 2px solid #000; font-family: 'IBM Plex Sans', sans-serif; text-align: center; background: #fff; color: #000; page-break-after: always; }
  .print-badge .pb-site { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 2px; margin-bottom: 4px; }
  .print-badge .pb-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; margin: 4px 0; }
  .print-badge .pb-trade { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #555; }
  .print-badge .pb-id { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: #888; margin-top: 4px; }
  .print-badge .pb-qr { margin: 8px auto; display: flex; justify-content: center; }
  .print-badge .pb-bar { background: #000; color: #fff; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; font-size: 0.85rem; padding: 3px 0; margin-top: 6px; }

  .empty { text-align: center; padding: 50px 20px; color: var(--gray4); font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; }
  .empty .icon { font-size: 2.5rem; margin-bottom: 10px; }

  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #fff;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; padding: 10px 18px; border-radius: 3px;
    opacity: 0; transform: translateY(8px); transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .stats-row { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<header>
  <div class="logo">Site<em>Log</em> <span style="font-size:1rem;letter-spacing:1px;opacity:.6">ADMIN (DB)</span></div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showPage('register')">⛑ Εγγραφή</button>
    <button class="tab-btn" onclick="showPage('workers')">👷 Εργαζόμενοι</button>
  </div>
</header>

<div class="page active" id="page-register">
  <div class="card">
    <div class="card-header">Εγγραφή Νέου Εργαζομένου</div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-group"><label>Α.Μ.Α. *</label><input type="text" id="ama" placeholder="000000000"></div>
        <div class="form-group"><label>Α.Μ.Κ.Α. *</label><input type="text" id="amka" placeholder="00000000000"></div>
        <div class="form-group"><label>Α.Φ.Μ.</label><input type="text" id="afm" placeholder="000000000"></div>
        <div class="form-group"><label>ΑΡ. ΑΔ. ΕΡΓΑΣΙΑΣ</label><input type="text" id="arAd" placeholder="000000"></div>
        <div class="form-group"><label>ΕΠΩΝΥΜΟ *</label><input type="text" id="eponimo" placeholder="Παπαδόπουλος"></div>
        <div class="form-group"><label>ΟΝΟΜΑ *</label><input type="text" id="onoma" placeholder="Γιώργης"></div>
        <div class="form-group full"><label>ΠΑΤΡΩΝΥΜΟ</label><input type="text" id="patronimo" placeholder="Νικόλαος"></div>
        <div class="form-group full"><label>ΕΙΔΙΚΟΤΗΤΑ *</label><input type="text" id="eidikotita" placeholder="π.χ. Χτίστης, Σιδηρουργός…"></div>
        <div class="form-group full">
          <label>ΦΑΣΗ ΚΑΤΑΣΚΕΥΗΣ *</label>
          <select id="fasi">
            <option value="">— Επιλογή —</option>
            <option>01: Εκσκαφές & Οικοδομικός Σκελετός</option>
            <option>02: Τοιχοποιίες</option>
            <option>03: Επιχρίσματα (Σοβατίσματα)</option>
            <option>04: Δάπεδα - Επενδύσεις</option>
            <option>05: Διάφορες Εργασίες</option>
            <option>06: Εργασίες Εγκαταστάσεων</option>
          </select>
        </div>
        <div class="form-group"><label>ΕΡΓΟΛΑΒΟΣ</label><input type="text" id="ergolabos" placeholder="Επωνυμία εργολάβου"></div>
        <div class="form-group"><label>ΑΦΜ ΕΡΓΟΛΑΒΟΥ</label><input type="text" id="afmErg" placeholder="000000000"></div>
      </div>
      <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn btn-yellow" onclick="registerWorker()" id="btnRegister">+ Εγγραφή & Δημιουργία QR</button>
        <button class="btn btn-outline" onclick="clearRegForm()">Καθαρισμός</button>
      </div>
    </div>
  </div>
</div>

<div class="page" id="page-workers">
  <div class="stats-row" id="statsRow">
    <div class="stat-box"><div class="stat-num" id="sTot">0</div><div class="stat-lbl">Συνολο Εργατων</div></div>
    <div class="stat-box"><div class="stat-num" id="sTrades" style="color:var(--orange)">0</div><div class="stat-lbl">Ειδικοτητες</div></div>
    <div class="stat-box"><div class="stat-num" id="sCompanies" style="color:#7ab4ff">0</div><div class="stat-lbl">Εργολαβοι</div></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span>Μητρώο Εργαζομένων</span>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline btn-sm" onclick="fetchWorkersFromSupabase()">🔄 Ανανέωση από DB</button>
        <button class="btn btn-yellow btn-sm" onclick="printAllBadges()">🖨 Εκτύπωση Όλων</button>
      </div>
    </div>
    <div class="card-body">
      <div class="toolbar">
        <input type="text" id="workerSearch" placeholder="🔍 Αναζήτηση ονόματος, ειδικότητας, εργολάβου…" oninput="renderWorkers()">
      </div>
      <div class="worker-grid" id="workerGrid"></div>
      <div class="empty" id="workerEmpty" style="display:none">
        <div class="icon">👷</div>
        Δεν βρέθηκαν εργαζόμενοι στη Βάση Δεδομένων.
      </div>
    </div>
  </div>
</div>

<div id="printArea"></div>
<div class="toast" id="toast"></div>

<script>
  // --- Supabase Setup ---
  const supabaseUrl = 'https://nlrkhehgkfwdkxuknwwo.supabase.co';
  const supabaseKey = 'sb_publishable_ybrvNyLSgHkqcn3TlLJZQQ_uyj9_aBI';
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  let workers = [];

  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    event.target.classList.add('active');
    if (id === 'workers') renderWorkers();
  }

  function showToast(msg, color) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color || '#2ea84f';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  function genId() {
    const nums = workers.map(w => parseInt(w.id?.replace('W-','')) || 0);
    const next = nums.length ? Math.max(...nums) + 1 : 1001;
    return 'W-' + next;
  }

  // Generate QR Data URL
  function generateQRDataUrl(worker) {
    return new Promise((resolve, reject) => {
      try {
        const payload = JSON.stringify({
          id: worker.id, fn: worker.eponimo || '', ln: worker.onoma || '',
          trade: worker.eidikotita || '', fasi: worker.fasi || '', erg: worker.ergolabos || ''
        });
        const qr = qrcode(0, 'M');
        qr.addData(unescape(encodeURIComponent(payload)));
        qr.make();
        const SIZE = 400; const canvas = document.createElement('canvas');
        canvas.width = SIZE; canvas.height = SIZE; const ctx = canvas.getContext('2d');
        const mCount = qr.getModuleCount(); const cSize = SIZE / mCount;
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, SIZE, SIZE);
        ctx.fillStyle = '#000000';
        for (let r = 0; r < mCount; r++) {
          for (let c = 0; c < mCount; c++) {
            if (qr.isDark(r, c)) ctx.fillRect(Math.floor(c * cSize), Math.floor(r * cSize), Math.ceil(cSize), Math.ceil(cSize));
          }
        }
        resolve(canvas.toDataURL('image/png'));
      } catch (e) { reject(e); }
    });
  }

  // --- Supabase Database Functions ---

  async function fetchWorkersFromSupabase() {
    showToast('Φόρτωση από Supabase...', '#e8600a');
    const { data, error } = await supabase.from('workers').select('*').order('registeredAt', { ascending: false });
    
    if (error) {
      showToast('⚠ Σφάλμα φόρτωσης DB: ' + error.message, '#d93b3b');
      console.error('Supabase fetch error:', error);
      return;
    }
    
    workers = data || [];
    renderWorkers();
    showToast(`✓ Φορτώθηκαν ${workers.length} εργαζόμενοι`);
  }

  async function registerWorker() {
    const ama = document.getElementById('ama').value.trim();
    const amka = document.getElementById('amka').value.trim();
    const eponimo = document.getElementById('eponimo').value.trim();
    const onoma = document.getElementById('onoma').value.trim();
    const eidikotita = document.getElementById('eidikotita').value.trim();
    const fasi = document.getElementById('fasi').value;
    
    if (!ama) { showToast('⚠ Απαιτείται Α.Μ.Α.', '#e8600a'); return; }
    if (!amka) { showToast('⚠ Απαιτείται Α.Μ.Κ.Α.', '#e8600a'); return; }
    if (!eponimo) { showToast('⚠ Απαιτείται Επώνυμο', '#e8600a'); return; }
    if (!onoma) { showToast('⚠ Απαιτείται Όνομα', '#e8600a'); return; }
    if (!eidikotita) { showToast('⚠ Απαιτείται Ειδικότητα', '#e8600a'); return; }
    if (!fasi) { showToast('⚠ Επιλέξτε Φάση Κατασκευής', '#e8600a'); return; }

    const btn = document.getElementById('btnRegister');
    btn.disabled = true;
    btn.textContent = 'Αποθήκευση...';

    const id = genId();
    const worker = {
      id, ama, amka,
      afm: document.getElementById('afm').value.trim(),
      arAdErgasias: document.getElementById('arAd').value.trim(),
      eponimo, onoma,
      patronimo: document.getElementById('patronimo').value.trim(),
      eidikotita, fasi,
      ergolabos: document.getElementById('ergolabos').value.trim(),
      afmErgolabou: document.getElementById('afmErg').value.trim(),
      registeredAt: new Date().toISOString()
    };
    
    worker.qrData = await generateQRDataUrl(worker);

    // Εισαγωγή στο Supabase
    const { data, error } = await supabase.from('workers').insert([worker]).select();

    btn.disabled = false;
    btn.textContent = '+ Εγγραφή & Δημιουργία QR';

    if (error) {
      showToast('⚠ Σφάλμα εγγραφής: ' + error.message, '#d93b3b');
      console.error('Supabase insert error:', error);
      return;
    }

    // Προσθήκη στην τοπική λίστα και μετάβαση
    workers.unshift(data[0]);
    showToast(`✓ Εγγραφή επιτυχής στο Supabase!`);
    clearRegForm();

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-workers').classList.add('active');
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    renderWorkers();
  }

  function clearRegForm() {
    ['ama','amka','afm','arAd','eponimo','onoma','patronimo','eidikotita','ergolabos','afmErg'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fasi').value = '';
  }

  async function deleteWorker(id) {
    const w = workers.find(x => x.id === id);
    if (!w) return;
    if (!confirm(`Είστε σίγουροι ότι θέλετε να διαγράψετε τον/την ${w.eponimo || ''} ${w.onoma || ''} οριστικά από τη Βάση Δεδομένων;`)) return;
    
    showToast('Διαγραφή...', '#e8600a');
    const { error } = await supabase.from('workers').delete().eq('id', id);
    
    if (error) {
      showToast('⚠ Σφάλμα διαγραφής: ' + error.message, '#d93b3b');
      return;
    }

    workers = workers.filter(x => x.id !== id);
    renderWorkers();
    showToast('✓ Ο εργαζόμενος διαγράφηκε από το Supabase');
  }

  function renderWorkers() {
    const q = (document.getElementById('workerSearch')?.value || '').toLowerCase();
    const grid = document.getElementById('workerGrid');
    const empty = document.getElementById('workerEmpty');

    const filtered = workers.filter(w => (w.eponimo+' '+w.onoma+' '+w.ama+' '+w.amka+' '+w.eidikotita+' '+w.ergolabos).toLowerCase().includes(q));

    const trades = new Set(workers.map(w => w.eidikotita));
    const companies = new Set(workers.map(w => w.ergolabos).filter(Boolean));
    
    document.getElementById('sTot').textContent = workers.length;
    document.getElementById('sTrades').textContent = trades.size;
    document.getElementById('sCompanies').textContent = companies.size;

    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    grid.innerHTML = filtered.map(w => `
      <div class="worker-card" id="wcard-${w.id}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="worker-name">${w.eponimo || ''} ${w.onoma || ''}</div>
            <span class="badge badge-yellow" style="margin-top:4px;font-size:0.6rem">${w.eidikotita || '—'}</span>
          </div>
          <span class="badge badge-gray" style="font-size:0.6rem">${w.id}</span>
        </div>
        <div class="worker-meta">
          ${w.fasi ? '🏗 ' + w.fasi + '<br>' : ''}
          ${w.ergolabos ? '🏢 ' + w.ergolabos + '<br>' : ''}
          ΑΜΑ: ${w.ama || '—'} | ΑΜΚΑ: ${w.amka || '—'}<br>
          📅 ${w.registeredAt?.slice(0,10) || '—'}
        </div>
        ${w.qrData ? `<div class="qr-thumb"><img src="${w.qrData}" width="120" height="120" style="border-radius:3px;border:2px solid #fff;image-rendering:pixelated"></div>` : '<div class="qr-thumb" style="color:#555;font-size:0.7rem;font-family:monospace">No QR</div>'}
        <div class="worker-actions">
          <button class="btn btn-yellow btn-sm" onclick="printBadge('${w.id}')">🖨 Εκτύπωση</button>
          <button class="btn btn-red btn-sm" onclick="deleteWorker('${w.id}')">✕ Διαγραφή</button>
        </div>
      </div>
    `).join('');
  }

  async function printBadge(id) {
    const w = workers.find(x => x.id === id);
    if (!w) return;
    let qrSrc = w.qrData || await generateQRDataUrl(w);
    const area = document.getElementById('printArea');
    area.innerHTML = `
      <div class="print-badge">
        <div class="pb-site">⛑ ΤΑΥΤΟΤΗΤΑ ΕΡΓΑΖΟΜΕΝΟΥ</div>
        <div class="pb-name">${w.eponimo || ''} ${w.onoma || ''}</div>
        <div class="pb-trade">${w.eidikotita || ''}${w.fasi ? ' | ' + w.fasi : ''}${w.ergolabos ? '<br>' + w.ergolabos : ''}</div>
        <div class="pb-qr"><img src="${qrSrc}" width="200" height="200" style="image-rendering:pixelated"></div>
        <div class="pb-id">ΑΜΑ: ${w.ama || '—'} | ΑΜΚΑ: ${w.amka || '—'}</div>
        <div class="pb-bar">ΣΑΡΩΣΗ ΓΙΑ ΠΑΡΟΥΣΙΑ</div>
      </div>`;
    area.style.display = 'block';
    setTimeout(() => { window.print(); setTimeout(() => { area.style.display = 'none'; area.innerHTML = ''; }, 1000); }, 300);
  }

  async function printAllBadges() {
    if (workers.length === 0) { showToast('Δεν υπάρχουν εργαζόμενοι για εκτύπωση', '#e8600a'); return; }
    showToast('Προετοιμασία badges…', '#e8600a');
    const area = document.getElementById('printArea'); area.innerHTML = '';
    for (const w of workers) {
      const qrSrc = w.qrData || await generateQRDataUrl(w);
      const div = document.createElement('div'); div.className = 'print-badge';
      div.innerHTML = `
        <div class="pb-site">⛑ ΤΑΥΤΟΤΗΤΑ ΕΡΓΑΖΟΜΕΝΟΥ</div>
        <div class="pb-name">${w.eponimo || ''} ${w.onoma || ''}</div>
        <div class="pb-trade">${w.eidikotita || ''}${w.fasi ? ' | ' + w.fasi : ''}${w.ergolabos ? '<br>' + w.ergolabos : ''}</div>
        <div class="pb-qr"><img src="${qrSrc}" width="200" height="200" style="image-rendering:pixelated"></div>
        <div class="pb-id">ΑΜΑ: ${w.ama || '—'} | ΑΜΚΑ: ${w.amka || '—'}</div>
        <div class="pb-bar">ΣΑΡΩΣΗ ΓΙΑ ΠΑΡΟΥΣΙΑ</div>`;
      area.appendChild(div);
    }
    area.style.display = 'block';
    setTimeout(() => { window.print(); setTimeout(() => { area.style.display = 'none'; area.innerHTML = ''; }, 1000); }, 400);
  }

  // Αρχική φόρτωση δεδομένων από Supabase κατά το άνοιγμα της σελίδας
  fetchWorkersFromSupabase();
</script>
</body>
</html>
