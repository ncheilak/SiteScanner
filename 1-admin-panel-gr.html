<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteLog — Διαχείριση Εργαζομένων (Supabase Fixed)</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --black: #0d0d0d; --yellow: #f5c800; --yellow-dk: #c9a200; --orange: #e8600a;
    --white: #f4efe6; --gray: #1e1e1e; --gray2: #2a2a2a; --gray3: #3d3d3d;
    --gray4: #5a5a5a; --green: #2ea84f; --red: #d93b3b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }

  header {
    background: var(--yellow); color: var(--black); padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 4px solid var(--orange); position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; letter-spacing: 3px; }
  .logo em { color: var(--orange); font-style: normal; }
  .nav-tabs { display: flex; gap: 4px; }
  .tab-btn {
    background: rgba(0,0,0,0.12); border: none; padding: 7px 18px;
    font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 1.5px;
    color: var(--black); cursor: pointer; border-radius: 2px; transition: all 0.15s;
  }
  .tab-btn.active { background: var(--black); color: var(--yellow); }
  .tab-btn:hover { background: rgba(0,0,0,0.2); }

  .page { display: none; max-width: 1120px; margin: 0 auto; padding: 28px 16px; }
  .page.active { display: block; }

  .card { background: var(--gray); border: 1px solid var(--gray3); border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
  .card-header {
    background: var(--gray2); padding: 10px 18px; font-family: 'Bebas Neue', sans-serif;
    font-size: 1.05rem; letter-spacing: 2px; color: var(--yellow);
    border-bottom: 2px solid var(--orange); display: flex; align-items: center; justify-content: space-between;
  }
  .card-body { padding: 18px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; font-weight: 600; color: var(--yellow); text-transform: uppercase; letter-spacing: 1px; }
  input, select {
    background: var(--black); border: 1px solid var(--gray3); border-radius: 2px;
    color: var(--white); font-family: 'IBM Plex Sans', sans-serif; font-size: 0.88rem;
    padding: 8px 10px; outline: none; width: 100%;
  }

  .btn { border: none; border-radius: 2px; cursor: pointer; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; padding: 10px 20px; font-size: 1rem; }
  .btn-yellow { background: var(--yellow); color: var(--black); }
  .btn-orange { background: var(--orange); color: #fff; }
  .btn-outline { background: transparent; border: 1px solid var(--gray3); color: var(--white); }
  .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
  .btn-red { background: var(--red); color: #fff; }

  .worker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .worker-card { background: var(--gray2); border: 1px solid var(--gray3); border-radius: 3px; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .worker-name { font-weight: 600; font-size: 1rem; color: #fff; }
  .worker-meta { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: #aaa; line-height: 1.6; }
  
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--gray3); border-radius: 3px; margin-bottom: 20px; }
  .stat-box { background: var(--gray2); padding: 14px; text-align: center; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--yellow); }

  @media print { body * { visibility: hidden; } #printArea, #printArea * { visibility: visible; } #printArea { position: fixed; top: 0; left: 0; width: 100%; } }
  #printArea { display: none; }
  .print-badge { width: 85mm; padding: 8mm; border: 2px solid #000; font-family: 'IBM Plex Sans', sans-serif; text-align: center; background: #fff; color: #000; page-break-after: always; margin-bottom: 20px;}

  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #fff;
    padding: 10px 18px; border-radius: 3px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">Site<em>Log</em> <span style="font-size:1rem;opacity:.6">ADMIN</span></div>
  <div class="nav-tabs">
    <button class="tab-btn active" id="tab-register" onclick="showPage('register')">⛑ Εγγραφή</button>
    <button class="tab-btn" id="tab-workers" onclick="showPage('workers')">👷 Εργαζόμενοι</button>
  </div>
</header>

<div class="page active" id="page-register">
  <div class="card">
    <div class="card-header">Εγγραφή Νέου Εργαζομένου</div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-group"><label>Α.Μ.Α. *</label><input type="text" id="ama"></div>
        <div class="form-group"><label>Α.Μ.Κ.Α. *</label><input type="text" id="amka"></div>
        <div class="form-group"><label>ΕΠΩΝΥΜΟ *</label><input type="text" id="eponimo"></div>
        <div class="form-group"><label>ΟΝΟΜΑ *</label><input type="text" id="onoma"></div>
        <div class="form-group full"><label>ΕΙΔΙΚΟΤΗΤΑ *</label><input type="text" id="eidikotita"></div>
        <div class="form-group full">
          <label>ΦΑΣΗ ΚΑΤΑΣΚΕΥΗΣ *</label>
          <select id="fasi">
            <option value="">— Επιλογή —</option>
            <option>01: Εκσκαφές & Οικοδομικός Σκελετός</option>
            <option>02: Τοιχοποιίες</option>
            <option>03: Επιχρίσματα (Σοβατίσματα)</option>
            <option>04: Δάπεδα - Επενδύσεις</option>
            <option>05: Διάφορες Εργασίες</option>
            <option>06: Εργασίες Εγκαταστάσεων</option>
          </select>
        </div>
        <div class="form-group"><label>ΕΡΓΟΛΑΒΟΣ</label><input type="text" id="ergolabos"></div>
        <div class="form-group"><label>ΑΦΜ ΕΡΓΟΛΑΒΟΥ</label><input type="text" id="afmErg"></div>
      </div>
      <div style="margin-top:16px;">
        <button class="btn btn-yellow" onclick="registerWorker()" id="btnRegister">+ Εγγραφή στη Βάση</button>
      </div>
    </div>
  </div>
</div>

<div class="page" id="page-workers">
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="sTot">0</div><div class="stat-lbl">ΣΥΝΟΛΟ</div></div>
    <div class="stat-box"><div class="stat-num" id="sTrades" style="color:var(--orange)">0</div><div class="stat-lbl">ΕΙΔΙΚΟΤΗΤΕΣ</div></div>
    <div class="stat-box"><div class="stat-num" id="sCompanies" style="color:#7ab4ff">0</div><div class="stat-lbl">ΕΡΓΟΛΑΒΟΙ</div></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span>Μητρώο & QR Codes</span>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-yellow btn-sm" onclick="printAllBadges()">🖨 Εκτύπωση Όλων των QR</button>
      </div>
    </div>
    <div class="card-body">
      <div class="worker-grid" id="workerGrid"></div>
    </div>
  </div>
</div>

<div id="printArea"></div>
<div class="toast" id="toast"></div>

<script>
  // --- Supabase Config ---
  const supabaseUrl = 'https://nlrkhehgkfwdkxuknwwo.supabase.co';
  const supabaseKey = 'sb_publishable_ybrvNyLSgHkqcn3TlLJZQQ_uyj9_aBI';
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  let workers = [];

  // ΔΙΟΡΘΩΜΕΝΗ ΣΥΝΑΡΤΗΣΗ ΠΛΟΗΓΗΣΗΣ
  function showPage(pageId) {
    // Κλείσιμο όλων των σελίδων
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    // Αφαίρεση active από όλα τα κουμπιά
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    
    // Ενεργοποίηση επιλεγμένης σελίδας
    document.getElementById('page-' + pageId).classList.add('active');
    // Ενεργοποίηση επιλεγμένου tab
    document.getElementById('tab-' + pageId).classList.add('active');

    if (pageId === 'workers') {
        fetchWorkers();
    }
  }

  function showToast(msg, color = '#2ea84f') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Λήψη εργαζομένων από Supabase
  async function fetchWorkers() {
    const { data, error } = await supabase.from('workers').select('*').order('created_at', { ascending: false });
    if (error) {
        showToast('Σφάλμα: ' + error.message, '#d93b3b');
        return;
    }
    workers = data || [];
    renderWorkers();
  }

  // Σχεδίαση λίστας
  function renderWorkers() {
    const grid = document.getElementById('workerGrid');
    
    // Ενημέρωση στατιστικών
    document.getElementById('sTot').textContent = workers.length;
    document.getElementById('sTrades').textContent = new Set(workers.map(w => w.eidikotita)).size;
    document.getElementById('sCompanies').textContent = new Set(workers.map(w => w.ergolabos).filter(Boolean)).size;

    if (workers.length === 0) {
      grid.innerHTML = '<div style="padding:40px; color:#666; text-align:center; width:100%;">Δεν υπάρχουν εργαζόμενοι στη βάση.</div>';
      return;
    }

    grid.innerHTML = workers.map(w => `
      <div class="worker-card">
        <div style="display:flex; justify-content:space-between;">
          <div class="worker-name">${w.eponimo} ${w.onoma}</div>
        </div>
        <div class="worker-meta">
          ID: ${w.id}<br>
          ${w.eidikotita}<br>
          ${w.ergolabos || '—'}
        </div>
        <div style="background:#fff; padding:10px; margin:10px 0; display:flex; justify-content:center; border-radius:4px;">
           <div id="qr-${w.id}"></div>
        </div>
        <div style="display:flex; gap:5px;">
            <button class="btn btn-outline btn-sm" onclick="printSingle('${w.id}')" style="flex:1">Εκτύπωση</button>
            <button class="btn btn-red btn-sm" onclick="deleteWorker('${w.id}')">✕</button>
        </div>
      </div>
    `).join('');

    // Δημιουργία QR για κάθε κάρτα
    workers.forEach(w => {
      const qrDiv = document.getElementById('qr-' + w.id);
      if(qrDiv) {
        const qr = qrcode(0, 'M');
        const payload = JSON.stringify({id: w.id, ep: w.eponimo, on: w.onoma, tr: w.eidikotita});
        qr.addData(unescape(encodeURIComponent(payload)));
        qr.make();
        qrDiv.innerHTML = qr.createImgTag(4);
      }
    });
  }

  // Εγγραφή νέου
  async function registerWorker() {
    const btn = document.getElementById('btnRegister');
    const fields = ['ama', 'amka', 'eponimo', 'onoma', 'eidikotita', 'fasi', 'ergolabos', 'afmErg'];
    const val = {};
    fields.forEach(f => val[f] = document.getElementById(f).value.trim());

    if (!val.ama || !val.eponimo || !val.eidikotita) {
      showToast('Συμπληρώστε τα υποχρεωτικά πεδία (*)', '#e8600a');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Αποθήκευση...';

    const { error } = await supabase.from('workers').insert([val]);

    if (error) {
      showToast('Σφάλμα: ' + error.message, '#d93b3b');
      btn.disabled = false;
      btn.textContent = '+ Εγγραφή στη Βάση';
    } else {
      showToast('Επιτυχής εγγραφή!');
      fields.forEach(f => document.getElementById(f).value = '');
      btn.disabled = false;
      btn.textContent = '+ Εγγραφή στη Βάση';
      showPage('workers'); // Μετάβαση στη λίστα
    }
  }

  async function deleteWorker(id) {
    if(!confirm('Διαγραφή εργαζομένου;')) return;
    const { error } = await supabase.from('workers').delete().eq('id', id);
    if (!error) {
        showToast('Διαγράφηκε');
        fetchWorkers();
    }
  }

  // Εκτύπωση όλων
  async function printAllBadges() {
    const area = document.getElementById('printArea');
    area.innerHTML = '';
    
    workers.forEach(w => {
      const qr = qrcode(0, 'M');
      const payload = JSON.stringify({id: w.id, ep: w.eponimo, on: w.onoma, tr: w.eidikotita});
      qr.addData(unescape(encodeURIComponent(payload)));
      qr.make();
      const qrImg = qr.createDataURL(5);

      area.innerHTML += `
        <div class="print-badge">
          <div style="font-family:'Bebas Neue'; font-size:1.2rem; letter-spacing:2px;">⛑ SITE LOG - ΤΑΥΤΟΤΗΤΑ</div>
          <div style="font-size:1.5rem; font-weight:bold; margin:10px 0;">${w.eponimo} ${w.onoma}</div>
          <div style="color:#555;">${w.eidikotita}</div>
          <div style="margin:15px 0;"><img src="${qrImg}" width="180"></div>
          <div style="font-family:monospace; font-size:0.8rem;">ID: ${w.id} | ΑΜΑ: ${w.ama}</div>
        </div>
      `;
    });

    area.style.display = 'block';
    setTimeout(() => {
        window.print();
        area.style.display = 'none';
    }, 500);
  }

  function printSingle(id) {
    const w = workers.find(x => x.id == id);
    if(!w) return;
    workers = [w]; // Προσωρινά μόνο αυτός για την εκτύπωση
    printAllBadges();
    fetchWorkers(); // Επαναφορά λίστας
  }

  // Αρχική φόρτωση
  fetchWorkers();
</script>
</body>
</html>
