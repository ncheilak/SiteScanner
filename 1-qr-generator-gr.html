<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteLog — QR Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --black:#0d0d0d;--yellow:#f5c800;--yellow-dk:#c9a200;--orange:#e8600a;
    --white:#f4efe6;--gray:#1e1e1e;--gray2:#2a2a2a;--gray3:#3d3d3d;
    --gray4:#5a5a5a;--green:#2ea84f;--red:#d93b3b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--black);color:var(--white);font-family:'IBM Plex Sans',sans-serif;min-height:100vh}

  header { background:var(--gray); padding:20px; border-bottom:1px solid var(--gray3); display:flex; justify-content:space-between; align-items:center; }
  .logo { font-family:'Bebas Neue',cursive; font-size:2rem; color:var(--yellow); letter-spacing:1px; }

  .container { max-width:900px; margin:0 auto; padding:40px 20px; }

  /* Επαναφορά στυλ αναζήτησης */
  .search-section { background:var(--gray); border:1px solid var(--gray3); padding:24px; border-radius:2px; margin-bottom:40px; }
  .search-label { font-family:'IBM Plex Mono',monospace; font-size:0.8rem; color:var(--yellow); text-transform:uppercase; margin-bottom:15px; display:block; }
  
  /* Νέα διάταξη πεδίων αναζήτησης */
  .search-grid { display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
  .search-input { 
    flex:1; min-width:180px; background:var(--gray2); border:1px solid var(--gray3); 
    padding:12px; color:white; font-family:inherit; outline:none;
  }
  .search-input:focus { border-color:var(--yellow); }

  .btn { border:none; border-radius:2px; padding:12px 24px; font-weight:600; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; transition:all 0.2s; display:inline-flex; align-items:center; justify-content:center; gap:8px; }
  .btn-yellow { background:var(--yellow); color:var(--black); }
  .btn-yellow:hover { background:var(--yellow-dk); }
  .btn-sm { padding:6px 12px; font-size:0.75rem; border:1px solid var(--gray3); background:var(--gray2); color:var(--white); text-decoration:none; }

  /* Results */
  .results-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:20px; border-bottom:1px solid var(--gray3); padding-bottom:10px; }
  .results-title { font-family:'IBM Plex Mono',monospace; font-size:0.85rem; color:var(--gray4); text-transform:uppercase; }
  .worker-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
  .worker-card { background:var(--gray); border:1px solid var(--gray3); padding:16px; border-radius:2px; }
  .w-name { font-weight:600; font-size:1.1rem; margin-bottom:4px; }
  .w-sub { font-size:0.85rem; color:var(--gray4); font-family:'IBM Plex Mono',monospace; }
  .w-contractor { color:var(--yellow); font-size:0.8rem; margin-top:4px; }
  
  .actions { display:flex; gap:8px; margin-top:15px; }

  /* Print Styles */
  #printArea { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; padding:40px; color:black; }
  .print-badge { width:350px; border:2px solid black; padding:20px; text-align:center; margin:0 auto; font-family: sans-serif; }
  
  @media print {
    body * { visibility: hidden; }
    #printArea, #printArea * { visibility: visible; }
    #printArea { position: absolute; left: 0; top: 0; display:block !important; }
  }

  .toast { position:fixed; bottom:20px; right:20px; padding:12px 24px; border-radius:2px; color:white; z-index:10000; }
</style>
</head>
<body>

<header>
  <div class="logo">SITELOG <span style="color:var(--white); font-size:0.8rem; vertical-align:middle; margin-left:10px;">QR GENERATOR</span></div>
  <a href="index.html" class="btn btn-sm">← ΠΙΣΩ ΣΤΗΝ ΑΡΧΙΚΗ</a>
</header>

<div class="container no-print">
  <div class="search-section">
    <div class="search-label">Αναζήτηση Εργαζομένου</div>
    
    <div class="search-grid">
      <input type="text" id="searchEponimo" class="search-input" placeholder="Επώνυμο...">
      <input type="text" id="searchOnoma" class="search-input" placeholder="Όνομα...">
      <select id="searchErgolabos" class="search-input" style="cursor:pointer">
        <option value="">— Όλοι οι Εργολάβοι —</option>
      </select>
    </div>

    <button class="btn btn-yellow" style="width:100%; margin-top:10px;" onclick="doSearch()" id="searchBtn">ΑΝΑΖΗΤΗΣΗ</button>
  </div>

  <div id="resultsSection" style="display:none;">
    <div class="results-header">
      <div class="results-title" id="resultsLabel">ΑΠΟΤΕΛΕΣΜΑΤΑ</div>
    </div>
    <div class="worker-grid" id="workerGrid"></div>
  </div>
</div>

<div id="printArea"></div>

<script>
  const SUPABASE_URL = 'https://nlrkhehgkfwdkxuknwwo.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_ybrvNyLSgHkqcn3TlLJZQQ_uyj9_aBI';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  let qrCache = {};

  // Φόρτωση εργολάβων στο dropdown
  async function loadContractors() {
    const { data } = await db.from('workers').select('ergolabos');
    if (data) {
      const unique = [...new Set(data.map(w => w.ergolabos).filter(e => e && e.trim() !== ''))].sort();
      const select = document.getElementById('searchErgolabos');
      unique.forEach(erg => {
        const opt = document.createElement('option');
        opt.value = erg; opt.textContent = erg;
        select.appendChild(opt);
      });
    }
  }
  loadContractors();

  async function doSearch() {
    const ep = document.getElementById('searchEponimo').value.trim();
    const on = document.getElementById('searchOnoma').value.trim();
    const erg = document.getElementById('searchErgolabos').value;

    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    btn.textContent = 'ΑΝΑΖΗΤΗΣΗ...';

    let query = db.from('workers').select('*');
    if (ep) query = query.ilike('eponimo', `%${ep}%`);
    if (on) query = query.ilike('onoma', `%${on}%`);
    if (erg) query = query.eq('ergolabos', erg);

    const { data, error } = await query.order('eponimo').limit(20);
    
    btn.disabled = false;
    btn.textContent = 'ΑΝΑΖΗΤΗΣΗ';

    if (error) { alert('Σφάλμα: ' + error.message); return; }

    document.getElementById('resultsSection').style.display = 'block';
    const grid = document.getElementById('workerGrid');
    grid.innerHTML = '';
    window._searchResults = data;

    data.forEach(w => {
      const card = document.createElement('div');
      card.className = 'worker-card';
      card.innerHTML = `
        <div class="w-name">${w.eponimo} ${w.onoma}</div>
        <div class="w-sub">ID: ${w.id}</div>
        <div class="w-contractor">${w.ergolabos || ''}</div>
        <div class="actions">
          <button class="btn btn-sm" onclick="downloadQR('${w.id}')">💾 QR</button>
          <button class="btn btn-sm" onclick="printBadge('${w.id}')">🖨 ΕΚΤΥΠΩΣΗ</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  // UTF-16 σε UTF-8 για να μην βγαίνουν "Κινέζικα"
  function utf16to8(str) {
    let out = "", i, len, c;
    len = str.length;
    for(i = 0; i < len; i++) {
      c = str.charCodeAt(i);
      if ((c >= 0x0001) && (c <= 0x007F)) { out += str.charAt(i); }
      else if (c > 0x07FF) {
        out += String.fromCharCode(0xE0 | ((c >> 12) & 0x0F));
        out += String.fromCharCode(0x80 | ((c >>  6) & 0x3F));
        out += String.fromCharCode(0x80 | ((c >>  0) & 0x3F));
      } else {
        out += String.fromCharCode(0xC0 | ((c >>  6) & 0x1F));
        out += String.fromCharCode(0x80 | ((c >>  0) & 0x3F));
      }
    }
    return out;
  }

  async function generateQRDataUrl(worker) {
    if (qrCache[worker.id]) return qrCache[worker.id];
    // Payload με Ελληνικά
    const payload = JSON.stringify({
      id: worker.id,
      n: `${worker.eponimo} ${worker.onoma}`,
      e: worker.ergolabos || ''
    });
    const qr = qrcode(0, 'M');
    qr.addData(utf16to8(payload));
    qr.make();
    qrCache[worker.id] = qr.createDataURL(8, 8);
    return qrCache[worker.id];
  }

  async function downloadQR(id) {
    const w = window._searchResults.find(x => x.id === id);
    const url = await generateQRDataUrl(w);
    const a = document.createElement('a');
    a.href = url;
    a.download = `QR-${w.eponimo}.png`;
    a.click();
  }

  async function printBadge(id) {
    const w = window._searchResults.find(x => x.id === id);
    const qrSrc = await generateQRDataUrl(w);
    const area = document.getElementById('printArea');
    area.innerHTML = `
      <div class="print-badge">
        <h2 style="margin-bottom:10px">SITE ACCESS</h2>
        <div style="font-size:1.4rem; font-weight:bold">${w.eponimo} ${w.onoma}</div>
        <div style="margin:10px 0">${w.ergolabos || ''}</div>
        <img src="${qrSrc}" width="180">
        <div style="margin-top:10px; font-family:monospace">ID: ${w.id}</div>
        <button class="no-print btn btn-yellow" onclick="window.print()" style="margin-top:20px">ΕΚΤΥΠΩΣΗ</button>
        <button class="no-print btn btn-sm" onclick="document.getElementById('printArea').style.display='none'">ΚΛΕΙΣΙΜΟ</button>
      </div>
    `;
    area.style.display = 'block';
  }
</script>
</body>
</html>
